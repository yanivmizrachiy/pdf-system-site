name: QA Gate (A4/RTL/Meta/MathJax)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run QA (must PASS)
        run: |
          bash scripts/qa_generate.sh
      - name: Upload QA report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: pages/qa.html
