name: QA Gate (A4/RTL/Meta/MathJax)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Build generated pages
        run: |
          if [ -f compiler/build.mjs ]; then node compiler/build.mjs; fi
          if [ -f compiler/build.js ]; then node compiler/build.js; fi
      - name: Guard generated pages policy
        run: |
          bash scripts/guard_generated_pages.sh "${{ github.event.before }}" "${{ github.sha }}"
      - name: Guard generated pages policy
        run: |
          bash scripts/guard_generated_pages.sh "${{ github.event.before }}" "${{ github.sha }}"
        with:
          python-version: "3.x"
      - name: Run QA (must PASS)
        run: |
          bash scripts/qa_generate.sh
      - name: Upload QA report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: pages/qa.html
