name: Governance Gate (RULES.md required)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  rules_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gate - require RULES.md update
        run: |
          bash scripts/check_rules_gate.sh ci
