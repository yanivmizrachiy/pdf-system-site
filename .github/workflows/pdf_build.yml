name: PDF Build Engine (A4 Production)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project deps
        run: |
          npm install

      - name: Run Generator
        run: |
          if [ -f compiler/build.mjs ]; then
            node compiler/build.mjs
          else
            echo "❌ compiler/build.mjs missing"
            ls -la compiler || true
            exit 1
          fi

      - name: Run QA
        run: |
          bash scripts/qa_generate.sh

      - name: Install Puppeteer (Chromium in CI)
        run: |
          npm install puppeteer

      - name: Render PDFs (A4)
        run: |
          node << "JS"
          const puppeteer = require("puppeteer");
          const fs = require("fs");
          const path = require("path");

          (async () => {
            const pagesDir = path.join(process.cwd(), "pages");
            const outDir = path.join(process.cwd(), "artifacts");
            if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

            if (!fs.existsSync(pagesDir)) {
              console.error("❌ pages/ missing");
              process.exit(1);
            }

            const files = fs.readdirSync(pagesDir).filter(f => /^page-\\d{3}\\.html$/i.test(f));
            if (files.length === 0) {
              console.error("❌ no pages/page-*.html found");
              process.exit(1);
            }

            const browser = await puppeteer.launch({ headless: "new" });
            const page = await browser.newPage();

            for (const file of files) {
              const fileUrl = "file://" + path.join(pagesDir, file);
              await page.goto(fileUrl, { waitUntil: "networkidle0" });

              const pdfPath = path.join(outDir, file.replace(".html", ".pdf"));
              await page.pdf({
                path: pdfPath,
                format: "A4",
                printBackground: true,
                margin: { top: "12mm", bottom: "12mm", left: "12mm", right: "12mm" }
              });

              console.log("✅ PDF built:", path.basename(pdfPath));
            }

            await browser.close();
            console.log("ALL PDFs READY");
          })().catch(e => { console.error(e); process.exit(1); });
          JS

      - name: Upload PDFs artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-pdfs
          path: artifacts/*.pdf
